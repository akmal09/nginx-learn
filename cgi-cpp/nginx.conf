# nginx.conf — CGI with C++ Hello World
#
# Requires fcgiwrap running on the same machine:
#   sudo apt install fcgiwrap
#   sudo systemctl start fcgiwrap

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # All requests to /cgi-bin/* are handled as CGI via fcgiwrap.
        # fcgiwrap bridges nginx (FastCGI) to classic CGI executables/scripts.
        location /cgi-bin/ {
            root /var/www;

            # Hand off to fcgiwrap over a Unix socket
            fastcgi_pass unix:/run/fcgiwrap.sock;

            include fastcgi_params;

            # Tell fcgiwrap which file on disk to execute
            fastcgi_param SCRIPT_FILENAME /var/www/cgi-wrapper.sh;
        }
    }
}